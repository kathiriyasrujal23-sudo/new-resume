<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Live Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1 class="logo">MyWebsite</h1>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<section id="home" class="hero">
    <h2>Welcome to My Website</h2>
    <p>Build something amazing today.</p>
    <button onclick="scrollToSection('contact')">Get Started</button>
</section>

<section id="about">
    <h2>About Us</h2>
    <p>We create modern and responsive websites using the latest technologies.</p>
</section>

<section id="services">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">Web Design</div>
        <div class="card">Development</div>
        <div class="card">SEO Optimization</div>
    </div>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<footer>
    <p>© 2026 MyWebsite | All Rights Reserved</p>
</footer>

<script src="script.js"></script>
</body>
</html>
